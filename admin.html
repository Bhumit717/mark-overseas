<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Master Admin | Mark Overseas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --primary: #08af08; --bg: #f4f7f6; }

        body { background: var(--bg); font-family: system-ui, -apple-system, sans-serif; }

        /* ── LOGIN ── */
        .login-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 380px;
            padding: 44px 40px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 24px 56px rgba(0,0,0,.10);
            text-align: center;
        }

        .login-card img.logo { height: 64px; margin-bottom: 20px; }

        .login-card h4 { font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }

        .login-card p.sub { color: #888; font-size: 13px; margin-bottom: 28px; }

        .btn-google {
            width: 100%;
            padding: 13px;
            border: 1.5px solid #ddd;
            border-radius: 12px;
            background: #fff;
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: box-shadow .2s, border-color .2s;
            cursor: pointer;
        }

        .btn-google:hover { box-shadow: 0 4px 14px rgba(0,0,0,.12); border-color: #bbb; }

        .btn-google:disabled { opacity: .6; cursor: not-allowed; }

        .err-msg { color: #e53e3e; font-size: 13px; margin-top: 14px; font-weight: 600; display: none; }

        /* ── DASHBOARD ── */
        #dashboard-section { display: none; }

        .top-bar {
            background: #fff;
            border-bottom: 1px solid #e8ecef;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-bar .brand { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 17px; }

        .top-bar .user-pill {
            background: #f0fdf0;
            border: 1px solid #c6f6c6;
            color: #276427;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .dashboard-body { padding: 28px; }

        .stat-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .stat-chip {
            background: #fff;
            border: 1px solid #e8ecef;
            border-radius: 12px;
            padding: 14px 22px;
            flex: 1;
            min-width: 160px;
        }

        .stat-chip .num { font-size: 28px; font-weight: 800; color: var(--primary); }
        .stat-chip .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: .5px; }

        .data-card {
            background: #fff;
            border-radius: 14px;
            border: 1px solid #e8ecef;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,.03);
        }

        .data-card-header {
            padding: 18px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f0f4f8;
        }

        .table thead th {
            background: #f8fafc;
            font-size: 11px;
            text-transform: uppercase;
            color: #64748b;
            padding: 14px 16px;
            border-bottom: 1.5px solid #f1f5f9;
            white-space: nowrap;
        }

        .table tbody td { padding: 14px 16px; vertical-align: middle; font-size: 14px; }

        .badge-verified { background: #dcfce7; color: #166534; border-radius: 6px; padding: 3px 10px; font-size: 11px; font-weight: 700; }
        .badge-spam    { background: #fee2e2; color: #991b1b; border-radius: 6px; padding: 3px 10px; font-size: 11px; font-weight: 700; }

        .msg-preview { max-width: 280px; font-size: 12px; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .loading-row td { text-align: center; padding: 60px 0; color: #aaa; }
    </style>
</head>

<body>

    <!-- 🔐 LOGIN -->
    <div id="login-section" class="login-wrap">
        <div class="login-card">
            <img src="images/mark-logo.png" alt="Logo" class="logo">
            <h4>Mark Admin</h4>
            <p class="sub">Sign in with your authorized Google account</p>

            <button id="btn-google-login" class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22" alt="G">
                Continue with Google
            </button>

            <div id="login-error" class="err-msg"></div>
        </div>
    </div>

    <!-- 📊 DASHBOARD -->
    <div id="dashboard-section">
        <div class="top-bar">
            <div class="brand">
                <img src="images/mark-logo.png" height="36" alt="logo">
                Administration Panel
            </div>
            <div class="d-flex align-items-center gap-3">
                <span class="user-pill" id="user-display"></span>
                <button class="btn btn-outline-danger btn-sm px-3" id="btn-logout">
                    <i class="bi bi-box-arrow-right me-1"></i> Logout
                </button>
            </div>
        </div>

        <div class="dashboard-body">
            <div class="stat-bar">
                <div class="stat-chip">
                    <div class="num" id="stat-total">—</div>
                    <div class="label">Total Inquiries</div>
                </div>
                <div class="stat-chip">
                    <div class="num" id="stat-today">—</div>
                    <div class="label">Today</div>
                </div>
                <div class="stat-chip">
                    <div class="num" id="stat-week">—</div>
                    <div class="label">This Week</div>
                </div>
            </div>

            <div class="data-card">
                <div class="data-card-header">
                    <div>
                        <h5 class="fw-bold mb-0">Client Inquiries</h5>
                        <small class="text-muted">All incoming web leads from the contact form</small>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-outline-secondary" id="btn-pdf">
                            <i class="bi bi-file-pdf me-1"></i>Export PDF
                        </button>
                        <button class="btn btn-sm btn-outline-primary" id="btn-refresh">
                            <i class="bi bi-arrow-clockwise me-1"></i>Refresh
                        </button>
                        <button class="btn btn-sm btn-danger" id="btn-delete-all">
                            <i class="bi bi-trash3 me-1"></i>Clear All
                        </button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Client Name</th>
                                <th>Email & Phone</th>
                                <th>Subject</th>
                                <th>Message</th>
                                <th class="text-center">Status</th>
                                <th class="text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <tr class="loading-row"><td colspan="7">Loading inquiries...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, deleteDoc, orderBy, query, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from "./js/firebase-config.js";

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Only this email can access admin
        const AUTHORIZED_EMAIL = 'markoverseas28@gmail.com';
        const VAULT_KEY = 'Mark_Vault';

        let allInquiriesData = [];

        // ─── AUTH STATE ───────────────────────────────────────────
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                if (user.email === AUTHORIZED_EMAIL) {
                    document.getElementById('login-section').style.display  = 'none';
                    document.getElementById('dashboard-section').style.display = 'block';
                    document.getElementById('user-display').innerText = user.email;
                    fetchData();
                } else {
                    showError(`⚠️ Access Denied: ${user.email} is not authorized.`);
                    await signOut(auth);
                }
            } else {
                document.getElementById('login-section').style.display  = 'flex';
                document.getElementById('dashboard-section').style.display = 'none';
            }
        });

        // ─── GOOGLE SIGN-IN ───────────────────────────────────────
        document.getElementById('btn-google-login').addEventListener('click', async () => {
            const btn = document.getElementById('btn-google-login');
            const errEl = document.getElementById('login-error');
            errEl.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> Signing in...`;

            try {
                provider.setCustomParameters({ prompt: 'select_account' });
                await signInWithPopup(auth, provider);
            } catch (e) {
                console.error('Login error:', e);
                showError(e.code === 'auth/popup-blocked'
                    ? '⚠️ Popup blocked by browser. Please allow popups for this site and try again.'
                    : '⚠️ Login Failed: ' + e.message);
                btn.disabled = false;
                btn.innerHTML = `<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22"> Continue with Google`;
            }
        });

        function showError(msg) {
            const el = document.getElementById('login-error');
            el.innerText = msg;
            el.style.display = 'block';
        }

        // ─── LOGOUT ───────────────────────────────────────────────
        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        // ─── REFRESH ──────────────────────────────────────────────
        document.getElementById('btn-refresh').addEventListener('click', () => fetchData());

        // ─── FETCH DATA ───────────────────────────────────────────
        async function fetchData() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr class="loading-row"><td colspan="7"><div class="spinner-border spinner-border-sm text-success me-2"></div> Loading...</td></tr>';
            allInquiriesData = [];

            try {
                const q = query(
                    collection(db, "inquiry_vault", VAULT_KEY, "data"),
                    orderBy("createdAt", "desc")
                );
                const snap = await getDocs(q);

                if (snap.empty) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-5 text-muted">No inquiries yet.</td></tr>';
                    updateStats([]);
                    return;
                }

                tbody.innerHTML = '';
                snap.forEach(d => {
                    const data = d.data();
                    const rawDate = data.createdAt ? new Date(data.createdAt) : null;
                    const dateStr = rawDate && !isNaN(rawDate) ? rawDate.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }) : 'N/A';
                    const timeStr = rawDate && !isNaN(rawDate) ? rawDate.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' }) : '';

                    allInquiriesData.push({ ...data, id: d.id, dateStr });

                    const badge = data.status === 'SPAM'
                        ? `<span class="badge-spam">SPAM</span>`
                        : `<span class="badge-verified">VERIFIED</span>`;

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="text-muted" style="font-size:12px;">${dateStr}<br><small>${timeStr}</small></td>
                        <td class="fw-semibold">${data.name || '—'}</td>
                        <td>
                            <a href="mailto:${data.email}" class="d-block text-decoration-none text-dark fw-semibold" style="font-size:13px;">${data.email || '—'}</a>
                            <small class="text-muted">${data.phone || '—'}</small>
                        </td>
                        <td><span style="background:#f1f5f9; padding:4px 8px; border-radius:6px; font-size:12px; color:#475569;">${data.subject || '—'}</span></td>
                        <td><div class="msg-preview" title="${(data.message||'').replace(/"/g,'&quot;')}">${data.message || '—'}</div></td>
                        <td class="text-center">${badge}</td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-danger" onclick="window.deleteItem('${d.id}')">
                                <i class="bi bi-trash-fill"></i>
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                updateStats(allInquiriesData);

            } catch (e) {
                console.error("DB Error:", e);
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-5 text-danger fw-bold">⚠️ Error loading data: ${e.message}</td></tr>`;
            }
        }

        // ─── STATS ────────────────────────────────────────────────
        function updateStats(data) {
            const today = new Date().toDateString();
            const weekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
            document.getElementById('stat-total').innerText = data.length;
            document.getElementById('stat-today').innerText = data.filter(d => d.createdAt && new Date(d.createdAt).toDateString() === today).length;
            document.getElementById('stat-week').innerText  = data.filter(d => d.createdAt && new Date(d.createdAt).getTime() >= weekAgo).length;
        }

        // ─── DELETE SINGLE ────────────────────────────────────────
        window.deleteItem = async (id) => {
            if (!confirm("Delete this inquiry?")) return;
            try {
                await deleteDoc(doc(db, "inquiry_vault", VAULT_KEY, "data", id));
                fetchData();
            } catch (e) { alert("Error: " + e.message); }
        };

        // ─── DELETE ALL ───────────────────────────────────────────
        document.getElementById('btn-delete-all').addEventListener('click', async () => {
            if (!confirm("⚠️ This will permanently delete ALL inquiries. Continue?")) return;
            if (prompt("Type 'DELETE' to confirm:") !== 'DELETE') return;
            try {
                const q = query(collection(db, "inquiry_vault", VAULT_KEY, "data"));
                const snap = await getDocs(q);
                const batch = writeBatch(db);
                snap.forEach(d => batch.delete(d.ref));
                await batch.commit();
                alert("✅ All inquiries cleared.");
                fetchData();
            } catch (e) { alert("Error: " + e.message); }
        });

        // ─── EXPORT PDF ───────────────────────────────────────────
        document.getElementById('btn-pdf').addEventListener('click', () => {
            if (!allInquiriesData.length) return alert("No data to export.");
            const { jsPDF } = window.jspdf;
            const pdfDoc = new jsPDF('l', 'mm', 'a4');
            pdfDoc.setFontSize(14);
            pdfDoc.text("Mark Overseas — Client Inquiries", 14, 14);
            pdfDoc.setFontSize(9);
            pdfDoc.setTextColor(150);
            pdfDoc.text("Generated: " + new Date().toLocaleString(), 14, 20);
            pdfDoc.autoTable({
                head: [['Date', 'Name', 'Email', 'Phone', 'Subject', 'Message']],
                body: allInquiriesData.map(i => [i.dateStr, i.name, i.email, i.phone, i.subject, i.message]),
                startY: 26,
                theme: 'grid',
                styles: { fontSize: 8, cellPadding: 4 },
                headStyles: { fillColor: [8, 175, 8] }
            });
            pdfDoc.save("MarkOverseas_Inquiries_" + new Date().toLocaleDateString().replace(/\//g,'-') + ".pdf");
        });

    </script>

</body>

</html>
